<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>회원가입 및 로그인 | HarborMesh Cloud</title>
  <meta name="description" content="HarborMesh Cloud 결제 링크를 열기 전에 이메일 인증이 포함된 계정을 만들거나 로그인하세요.">
  <link rel="icon" href="/favicon.svg">
  <link rel="stylesheet" href="/styles.css">
  <script defer src="/site-config.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="/auth.js"></script>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/ko" aria-label="HarborMesh Cloud 홈">
      <span class="brand-mark">HM</span>
      <span class="brand-text">HarborMesh Cloud</span>
    </a>
    <div class="header-actions">
      <div class="language-switch" aria-label="언어 선택">
        <a href="/auth.html" hreflang="en">EN</a>
        <a class="active" href="/ko/auth.html" hreflang="ko">KR</a>
      </div>
      <span data-auth-state></span>
    </div>
  </header>

  <main class="auth-main">
    <section class="auth-layout">
      <div class="auth-panel">
        <div class="eyebrow">회원가입</div>
        <h1>이메일 인증 후 결제 가능한 계정을 만드세요.</h1>
        <p class="muted">이메일 주소가 아이디로 사용됩니다. 결제 링크는 로그인과 이메일 인증이 완료된 후에만 열립니다.</p>
        <form data-signup-form>
          <label>이메일 주소<input name="email" type="email" autocomplete="email" required></label>
          <label>비밀번호<input name="password" type="password" autocomplete="new-password" minlength="8" required></label>
          <label>이름<input name="full_name" autocomplete="name" required></label>
          <label>휴대폰번호<input name="phone" autocomplete="tel" required></label>
          <label>주소<input name="address" autocomplete="street-address" required></label>
          <button class="button primary full" type="submit">회원가입</button>
        </form>
        <p data-auth-message class="auth-message"></p>
      </div>

      <div class="auth-panel">
        <div class="eyebrow">기존 고객</div>
        <h2>로그인</h2>
        <p class="muted">인증된 이메일과 비밀번호로 로그인하세요.</p>
        <form data-login-form>
          <label>이메일 주소<input name="email" type="email" autocomplete="email" required></label>
          <label>비밀번호<input name="password" type="password" autocomplete="current-password" required></label>
          <button class="button secondary full" type="submit">로그인</button>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
